name: ndvi-backend
version: 0.1.0.0
synopsis: NDVI Analysis Backend with Lazy Evaluation

dependencies:
  - base >= 4.7 && < 5
  - scotty
  - aeson
  - bytestring
  - text
  - wai
  - wai-extra
  - wai-cors
  - warp
  - http-types
  - directory
  - filepath
  - vector
  - cassava

library:
  source-dirs: src
  exposed-modules:
    - Types
    - Ndvi

executables:
  ndvi-server:
    main: Main.hs
    source-dirs: app
    dependencies:
      - ndvi-backend
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
